name: Scheduled Data Update

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Report mode to generate
        required: true
        default: premarket
        type: choice
        options:
          - premarket
          - postmarket
  schedule:
    # GitHub cron uses UTC. These run Monday-Friday during US market weekdays.
    # 11:00 UTC is 07:00 New York during EDT; 21:30 UTC is 17:30 New York during EDT.
    - cron: "0 11 * * 1-5"
    - cron: "30 21 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scheduled-data-update
  cancel-in-progress: false

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Select report mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.schedule }}" == "30 21 * * 1-5" ]]; then
            echo "mode=postmarket" >> "$GITHUB_OUTPUT"
          else
            echo "mode=premarket" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate report
        run: python scripts/generate_report.py --mode "${{ steps.mode.outputs.mode }}"

      - name: Build site
        run: python scripts/build_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Commit generated data
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports site
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update ${{ steps.mode.outputs.mode }} data"
            git push
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
